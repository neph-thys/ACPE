<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ACPE — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0a0e1a; --bg2:#111827; --bg3:#1a2235;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
    --accent:#4f8ef7; --green:#10b981; --red:#ef4444;
    --text:#f0f4ff; --muted:#8892a4;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;display:flex;align-items:center;justify-content:center;}

  .grid-bg{
    position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(79,142,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,142,247,0.04) 1px, transparent 1px);
    background-size:48px 48px;
    pointer-events:none;
  }

  .card{
    background:var(--bg2);border:1px solid var(--border2);
    border-radius:20px;padding:48px 44px;width:100%;max-width:420px;
    position:relative;z-index:1;
    animation:fadeUp 0.4s ease both;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

  .brand{margin-bottom:32px;}
  .brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;
    letter-spacing:-0.5px;color:var(--text);}
  .brand-sub{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:0.4px;}

  h2{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;margin-bottom:6px;}
  .sub{font-size:14px;color:var(--muted);margin-bottom:28px;}

  .field{margin-bottom:16px;}
  label{display:block;font-size:12px;font-weight:500;color:var(--muted);
    text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;}
  input{
    width:100%;background:var(--bg3);border:1px solid var(--border2);
    border-radius:10px;padding:11px 14px;color:var(--text);font-size:15px;
    font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;
  }
  input:focus{border-color:var(--accent);}

  .btn{
    width:100%;padding:13px;border-radius:10px;border:none;
    background:var(--accent);color:#fff;font-size:15px;font-weight:500;
    font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;
    transition:opacity 0.15s,transform 0.1s;
  }
  .btn:hover{opacity:0.9;} .btn:active{transform:scale(0.98);}

  .error{
    background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
    border-radius:8px;padding:10px 14px;font-size:13px;color:#fca5a5;
    margin-bottom:16px;display:none;
  }
  .divider{text-align:center;font-size:13px;color:var(--muted);margin:20px 0;}
  .link-btn{
    width:100%;padding:12px;border-radius:10px;
    border:1px solid var(--border2);background:transparent;
    color:var(--muted);font-size:14px;font-family:'DM Sans',sans-serif;
    cursor:pointer;transition:all 0.15s;text-decoration:none;display:block;text-align:center;
  }
  .link-btn:hover{border-color:var(--accent);color:var(--accent);}

  .demo-hint{
    margin-top:24px;padding:14px;background:rgba(79,142,247,0.06);
    border:1px solid rgba(79,142,247,0.15);border-radius:10px;font-size:12px;color:var(--muted);
  }
  .demo-hint strong{color:var(--accent);font-weight:500;}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="card">
  <div class="brand">
    <div class="brand-name">ACPE</div>
    <div class="brand-sub">Autonomous Campus Placement Engine</div>
  </div>

  <h2>Welcome back</h2>
  <p class="sub">Sign in to your account to continue</p>

  <div class="error" id="err"></div>

  <div class="field">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@college.edu" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••"/>
  </div>

  <button class="btn" onclick="doLogin()">Sign in</button>

  <div class="divider">or</div>
  <a href="/register" class="link-btn">Create a new account</a>

  <div class="demo-hint">
    <strong>Admin demo:</strong> admin@acpe.edu / admin123<br/>
    <strong>Student demo:</strong> alice@college.edu / (any password)
  </div>
</div>

<script>
async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('err');
  errEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent = 'Please fill in all fields.';
    errEl.style.display = 'block'; return;
  }

  const res  = await fetch('/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({email, password})
  });
  const data = await res.json();

  if (res.ok) {
    window.location.href = data.redirect;
  } else {
    errEl.textContent    = data.error;
    errEl.style.display  = 'block';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
